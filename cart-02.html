<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sunday Quiet | Shopping Cart</title>

    <!-- 1. Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- 2. 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- 3. 全站共用樣式 -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- ===================== NAV 導覽列 ===================== -->
    <div id="nav-placeholder"></div>

    <!-- ===================== MAIN ===================== -->
    <main class="container bg-light px-5 my-4 shadow rounded">

        <!-- ── 步驟進度條 ── -->
        <section class="py-5">
            <h3 class="fw-bold mb-5">購物車</h3>
            <div class="container">
                <div class="row">

                    <!-- 步驟 1（已完成） -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-success text-white d-flex justify-content-center align-items-center">
                                1
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar w-100 bg-success"></div>
                            </div>
                        </div>
                        <span>確認購物車</span>
                    </div>

                    <!-- 步驟 2（當前） -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-success text-white d-flex justify-content-center align-items-center">
                                2
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar bg-success" style="width: 30%"></div>
                            </div>
                        </div>
                        <span>付款與運送方式</span>
                    </div>

                    <!-- 步驟 3 -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-secondary-subtle text-secondary d-flex justify-content-center align-items-center">
                                3
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar bg-transparent" style="width: 30%"></div>
                            </div>
                        </div>
                        <span>填寫資料</span>
                    </div>

                    <!-- 步驟 4 -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-secondary-subtle text-secondary d-flex justify-content-center align-items-center">
                                4
                            </div>
                        </div>
                        <span>完成訂購</span>
                    </div>

                </div>
            </div>
        </section>

        <!-- ── 付款方式 ── -->
        <section>
            <hr>
            <h4 class="fw-bold mb-4">付款方式</h4>
            <div class="container mb-3">
                <div class="form-check py-3">
                    <input class="form-check-input" type="radio" name="payment" id="payment-credit" checked>
                    <label class="form-check-label mx-1" for="payment-credit">
                        信用卡付款 <i class="bi bi-credit-card"></i>
                    </label>
                </div>
                <hr>
                <div class="form-check py-3">
                    <input class="form-check-input" type="radio" name="payment" id="payment-atm">
                    <label class="form-check-label" for="payment-atm">網路 ATM</label>
                </div>
                <hr>
                <div class="form-check py-3">
                    <input class="form-check-input" type="radio" name="payment" id="payment-cvs">
                    <label class="form-check-label" for="payment-cvs">超商代碼</label>
                </div>
            </div>

            <!-- ── 運送方式 ── -->
            <hr>
            <h4 class="fw-bold mb-4">運送方式</h4>
            <div class="container mb-4">
                <div class="form-check py-3">
                    <input class="form-check-input" type="radio" name="shipping" id="shipping-home" checked>
                    <label class="form-check-label" for="shipping-home">黑貓宅配</label>
                </div>
                <hr>
                <div class="form-check py-3">
                    <input class="form-check-input" type="radio" name="shipping" id="shipping-cvs">
                    <label class="form-check-label" for="shipping-cvs">超商店到店</label>
                </div>
            </div>
            <hr>
        </section>

        <!-- ── 金額 Summary ── -->
        <section class="d-flex justify-content-end pe-2">
            <div class="p-3 rounded-3 shadow-sm bg-white" style="width: 300px;">
                <table class="table table-borderless table-sm mb-0">
                    <tbody class="text-sm">
                        <tr>
                            <th class="text-sub fw-light">數量：</th>
                            <td id="shopping-count" class="text-end">0</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">小記：</th>
                            <td id="shopping-sum" class="text-end">$0</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">運費：</th>
                            <td id="shopping-tax" class="text-end">$0</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">總計：</th>
                            <td id="shopping-total" class="text-end fw-bold">$0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <hr class="p-0 mb-0">

        <!-- ── 底部：上一步 + 下一步 ── -->
        <section class="d-flex justify-content-between align-items-center py-5">
            <a href="./cart-01.html" class="btn fw-semibold px-4 py-2 border-soft bg-btn-hover text-sub">
                上一步
            </a>
            <a href="./cart-03.html" class="btn fw-semibold px-4 py-2 border-soft bg-btn bg-btn-hover text-warm">
                下一步
            </a>
        </section>

    </main>

    <!-- ===================== FOOTER ===================== -->
    <div id="footer-placeholder"></div>

    <!-- ===================== JS ===================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/cart-02.js"></script>
    <script src="./js/components.js"></script>
</body>

</html>
