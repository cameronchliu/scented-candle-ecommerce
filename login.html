<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunday Quiet | Login</title>

  <!-- 1. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- 2. 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 3. 全站共用樣式 -->
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/login.css">

</head>

<body>
  <div id="nav-placeholder"></div>
  <section class="container-fluid position-relative py-5">
    <div class="row">

      <!-- ── 左側文案（lg 以上才顯示） ── -->
      <div class="col d-none d-lg-flex flex-column align-items-center justify-content-center">
        <div class="slogan-box">
          <h2 class="fw-bold text-warm mb-2">Scented moments for a calmer day.</h2>
          <div class="text-sub fs-5">Soft light, quiet breath, slower living.</div>
          <div class="text-main text-sm mt-3">
            Welcome back—let's make today feel a little softer ☁️
          </div>
        </div>
      </div>

      <!-- ── 右側登入卡片 ── -->
      <div class="col d-flex flex-column align-items-center justify-content-center">
        <div class="login-card bg-lightcream">

          <div class="text-center">
            <img src="./img/logo.png" class="logo w-25 mb-3 rounded-2" alt="Sunday Quiet Logo">
            <div class="text-sub mb-3">Sign in to continue</div>
          </div>

          <!-- 社群登入 -->
          <div class="d-flex justify-content-center mb-4">
            <a href="#" class="social-btn mx-2" aria-label="Facebook"><i class="bi bi-facebook fs-5"></i></a>
            <a href="#" class="social-btn mx-2" aria-label="Google"><i class="bi bi-google fs-5"></i></a>
            <a href="#" class="social-btn mx-2" aria-label="Twitter"><i class="bi bi-twitter fs-5"></i></a>
          </div>

          <div class="text-center text-sub text-sm mb-3">or sign in with your email</div>

          <!-- 表單 -->
          <div class="d-flex flex-column w-100">
            <input type="email" class="form-control mb-3" placeholder="name@example.com">
            <input type="password" class="form-control mb-2" placeholder="Password">

            <div class="d-flex justify-content-end mb-3">
              <a href="#" class="link-sq text-sm">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-sq fw-bold fs-5 w-100">Log in</button>

            <div class="text-center text-sub text-sm mt-3">
              New here?
              <a href="#" class="link-sq fw-semibold">Create an account</a>
            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- ── 底部社群圖示列 ── -->
    <div class="position-absolute footer-social-bar d-flex">
      <a href="#" class="footer-social" aria-label="Facebook"><i class="bi bi-facebook fs-5"></i></a>
      <a href="#" class="footer-social" aria-label="Messenger"><i class="bi bi-messenger fs-5"></i></a>
      <a href="#" class="footer-social" aria-label="Instagram"><i class="bi bi-instagram fs-5"></i></a>
    </div>
  </section>

  <div id="footer-placeholder"></div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="./js/components.js"></script>
</body>

</html>
