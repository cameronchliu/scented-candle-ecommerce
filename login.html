<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunday Quiet | Login</title>

  <!-- 1. Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- 2. 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 3. 全站共用樣式 -->
  <link rel="stylesheet" href="./css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/components.js"></script>

  <style>
    /* ============================================================
       Sunday Quiet — Login 頁面樣式
    ============================================================ */

    body {
      height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #F7F5F0;
      color: #4A4A4A;
    }

    .row {
      height: 100vh;
    }

    /* ── 色票 / Token ── */
    .text-main {
      color: #4A4A4A;
    }

    .text-sub {
      color: #A09486;
    }

    .text-warm {
      color: #4A3F35;
    }

    .bg-lightcream {
      background-color: #FDFDFC;
    }

    .border-cream {
      border-color: #C9C1B5 !important;
    }

    .border-soft {
      border-color: #D6CEC3 !important;
    }

    .bg-warm {
      background-color: #4A3F35;
    }

    .bg-btn {
      background-color: #F2EEE9;
    }

    .bg-btn-hover:hover {
      background-color: #E8E2D8 !important;
    }

    /* ── 字級 ── */
    .text-xs {
      font-size: 11px;
    }

    .text-sm {
      font-size: 14px;
    }

    .text-md {
      font-size: 16px;
    }

    /* ── 左側文案卡片 ── */
    .logo {
      min-width: 240px;
      max-width: 360px;
    }

    .slogan-box {
      max-width: 520px;
      padding: 40px 32px;
      border: 1px solid #D6CEC3;
      background: rgba(253, 253, 252, 0.72);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    /* ── 登入卡片 ── */
    .login-card {
      width: min(520px, 92%);
      border-radius: 22px;
      border: 1px solid #D6CEC3;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      padding: 36px 26px;
    }

    /* ── 表單 ── */
    .form-control {
      border: 1px solid #C9C1B5;
      background-color: #FDFDFC;
      padding: 12px 14px;
      border-radius: 12px;
      color: #4A4A4A;
    }

    .form-control:focus {
      border-color: #A09486;
      box-shadow: 0 0 0 0.2rem rgba(160, 148, 134, 0.18);
    }

    /* ── 社群登入按鈕 ── */
    .social-btn {
      width: 46px;
      height: 46px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #C9C1B5;
      background-color: #F2EEE9;
      color: #4A3F35;
      transition: 0.2s ease;
      text-decoration: none;
    }

    .social-btn:hover {
      background-color: #E8E2D8;
      color: #4A3F35;
    }

    /* ── 主要按鈕 ── */
    .btn-sq {
      border: 1px solid #C9C1B5;
      background-color: #F2EEE9;
      color: #4A3F35;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .btn-sq:hover {
      background-color: #E8E2D8 !important;
      color: #4A3F35;
    }

    /* ── 文字連結 ── */
    .link-sq {
      color: #A09486;
      text-decoration: none;
    }

    .link-sq:hover {
      color: #4A3F35;
      text-decoration: underline;
    }

    /* ── 底部社群圖示列 ── */
    .footer-social-bar {
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      gap: 14px !important;
    }

    @media (min-width: 992px) {
      .footer-social-bar {
        left: 25%;
        transform: translateX(-25%);
      }
    }

    .footer-social {
      width: 44px;
      height: 44px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #D6CEC3;
      background-color: rgba(253, 253, 252, 0.78);
      backdrop-filter: blur(4px);
      color: #4A3F35;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .footer-social:hover {
      background-color: #E8E2D8;
      color: #4A3F35;
    }
  </style>
</head>

<body>
  <section class="container-fluid position-relative">
    <div class="row">

      <!-- ── 左側文案（lg 以上才顯示） ── -->
      <div class="col d-none d-lg-flex flex-column align-items-center justify-content-center">
        <div class="slogan-box">
          <h2 class="fw-bold text-warm mb-2">Scented moments for a calmer day.</h2>
          <div class="text-sub fs-5">Soft light, quiet breath, slower living.</div>
          <div class="text-main text-sm mt-3">
            Welcome back—let's make today feel a little softer ☁️
          </div>
        </div>
      </div>

      <!-- ── 右側登入卡片 ── -->
      <div class="col d-flex flex-column align-items-center justify-content-center px-2">
        <div class="login-card bg-lightcream">

          <div class="text-center">
            <img src="./img/logo.png" class="logo w-50 mb-3" alt="Sunday Quiet Logo">
            <div class="text-sub mb-3">Sign in to continue</div>
          </div>

          <!-- 社群登入 -->
          <div class="d-flex justify-content-center mb-4">
            <a href="#" class="social-btn mx-2" aria-label="Facebook"><i class="bi bi-facebook fs-5"></i></a>
            <a href="#" class="social-btn mx-2" aria-label="Google"><i class="bi bi-google fs-5"></i></a>
            <a href="#" class="social-btn mx-2" aria-label="Twitter"><i class="bi bi-twitter fs-5"></i></a>
          </div>

          <div class="text-center text-sub text-sm mb-3">or sign in with your email</div>

          <!-- 表單 -->
          <div class="d-flex flex-column w-100">
            <input type="email" class="form-control mb-3" placeholder="name@example.com">
            <input type="password" class="form-control mb-2" placeholder="Password">

            <div class="d-flex justify-content-end mb-3">
              <a href="#" class="link-sq text-sm">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-sq fw-bold fs-5 w-100">Log in</button>

            <div class="text-center text-sub text-sm mt-3">
              New here?
              <a href="#" class="link-sq fw-semibold">Create an account</a>
            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- ── 底部社群圖示列 ── -->
    <div class="position-absolute footer-social-bar d-flex">
      <a href="#" class="footer-social" aria-label="Facebook"><i class="bi bi-facebook fs-5"></i></a>
      <a href="#" class="footer-social" aria-label="Messenger"><i class="bi bi-messenger fs-5"></i></a>
      <a href="#" class="footer-social" aria-label="Instagram"><i class="bi bi-instagram fs-5"></i></a>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
