<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base href="/scented-candle-ecommerce/">
    <title>Sunday Quiet | Shopping Cart</title>

    <!-- 1. Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- 2. 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- 3. 全站共用樣式 -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- ===================== NAV 導覽列 ===================== -->
    <div id="nav-placeholder"></div>

    <!-- ===================== MAIN ===================== -->
    <main class="container bg-light px-5 px-sm-4 px-md-5 my-4 shadow rounded">

        <!-- ── 步驟進度條 ── -->
        <section class="py-5">
            <h3 class="fw-bold mb-5">購物車</h3>
            <div class="container">
                <div class="row">

                    <!-- 步驟 1（當前） -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-success text-white d-flex justify-content-center align-items-center">
                                1
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar bg-success" style="width: 30%"></div>
                            </div>
                        </div>
                        <span>確認購物車</span>
                    </div>

                    <!-- 步驟 2 -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-secondary-subtle text-secondary d-flex justify-content-center align-items-center">
                                2
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar bg-transparent" style="width: 30%"></div>
                            </div>
                        </div>
                        <span>付款與運送方式</span>
                    </div>

                    <!-- 步驟 3 -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-secondary-subtle text-secondary d-flex justify-content-center align-items-center">
                                3
                            </div>
                            <div class="my-progress progress position-absolute top-50 start-100 translate-middle z-3">
                                <div class="progress-bar bg-transparent" style="width: 30%"></div>
                            </div>
                        </div>
                        <span>填寫資料</span>
                    </div>

                    <!-- 步驟 4 -->
                    <div class="col px-0 mx-0 text-center">
                        <div class="w-100 position-relative">
                            <div
                                class="mx-auto my-circle rounded-circle bg-secondary-subtle text-secondary d-flex justify-content-center align-items-center">
                                4
                            </div>
                        </div>
                        <span>完成訂購</span>
                    </div>

                </div>
            </div>
        </section>

        <!-- ── 訂單明細 ── -->
        <section>
            <hr>
            <h4 class="fw-bold my-4">訂單明細</h4>
            <div id="shopping-list"></div>
        </section>

        <!-- ── 金額 Summary ── -->
        <section class="d-flex justify-content-end pe-2">
            <div class="p-3 rounded-3 shadow-sm bg-white border" style="width: 300px;">
                <table class="table table-borderless table-sm mb-0">
                    <tbody class="text-sm">
                        <tr>
                            <th class="text-sub fw-light">數量：</th>
                            <td id="shopping-count" class="text-end">0</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">小記：</th>
                            <td id="shopping-sum" class="text-end">$0</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">運費：</th>
                            <td id="shopping-tax" class="text-end">$60</td>
                        </tr>
                        <tr>
                            <th class="text-sub fw-light">總計：</th>
                            <td id="shopping-total" class="text-end fw-bold">$0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <hr class="p-0 mb-0">

        <!-- ── 底部：返回 + 下一步 ── -->
        <section class="d-flex justify-content-between align-items-center py-5">
            <a href="./index.html" class="text-decoration-none text-sub d-flex align-items-center gap-1">
                <i class="bi bi-chevron-left"></i>
                返回購物
            </a>
            <a href="./cart-02.html" class="btn fw-semibold px-4 py-2 border-soft bg-btn bg-btn-hover text-warm">
                下一步
            </a>
        </section>

    </main>

    <!-- ===================== FOOTER ===================== -->
    <div id="footer-placeholder"></div>

    <!-- ===================== JS ===================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/cart-01.js"></script>
    <script src="./js/components.js"></script>

</body>

</html>
